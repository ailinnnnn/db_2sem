services:
  primary:
    image: postgres:15-alpine
    container_name: pg_primary
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: bakery_db
    ports:
      - "5440:5432"
    volumes:
      - ./primary_data:/var/lib/postgresql/data
    command: >
      postgres
      -c wal_level=replica
      -c max_wal_senders=10
      -c max_replication_slots=10
      -c listen_addresses='*'

  replica1:
    image: postgres:15-alpine
    container_name: pg_replica1
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: bakery_db
    ports:
      - "5441:5432"
    volumes:
      - ./replica1_data:/var/lib/postgresql/data
    depends_on:
      - primary

  replica2:
    image: postgres:15-alpine
    container_name: pg_replica2
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: bakery_db
    ports:
      - "5442:5432"
    volumes:
      - ./replica2_data:/var/lib/postgresql/data
    depends_on:
      - primary

  logical_primary:
    image: postgres:15-alpine
    container_name: pg_logical_primary
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: bakery_db
    ports:
      - "5443:5432"
    volumes:
      - ./logical_primary:/var/lib/postgresql/data
    command: >
      postgres
      -c wal_level=logical
      -c max_wal_senders=10
      -c max_replication_slots=10
      -c listen_addresses='*'

  logical_replica:
    image: postgres:15-alpine
    container_name: pg_logical_replica
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: bakery_db
    ports:
      - "5444:5432"
    volumes:
      - ./logical_replica:/var/lib/postgresql/data
    depends_on:
      - logical_primary
    command: >
      postgres
      -c listen_addresses='*'
