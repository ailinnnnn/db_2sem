services:
  postgres:
    image: postgres:15-alpine
    container_name: bakery_db
    environment:
      POSTGRES_DB: bakery_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5434:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d bakery_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  flyway:
    image: flyway/flyway:9-alpine
    container_name: bakery_migrations
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      FLYWAY_URL: jdbc:postgresql://postgres:5432/bakery_db
      FLYWAY_USER: admin
      FLYWAY_PASSWORD: admin123
      FLYWAY_SCHEMAS: bakery_db
      FLYWAY_LOCATIONS: filesystem:/flyway/sql
      FLYWAY_BASELINE_ON_MIGRATE: "true"
    volumes:
      - ../flyway/sql:/flyway/sql
    command: migrate

volumes:
  pg_data:
